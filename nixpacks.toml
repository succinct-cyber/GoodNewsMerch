# Nixpacks (Railway default builder) — must bind 0.0.0.0:$PORT or the proxy cannot reach the app.
[phases.build]
cmds = [
  "pip install -r requirements.txt",
  "python manage.py collectstatic --noinput",
]

[start]
cmd = "python manage.py migrate --noinput && gunicorn goodnews_merch.wsgi:application --bind 0.0.0.0:${PORT:-8000} --workers 2 --timeout 120 --access-logfile - --error-logfile -"
