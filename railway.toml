[deploy]
# Runs once per deploy before traffic switches — keeps HTTP worker startup fast (fewer 502s).
releaseCommand = "python manage.py migrate --noinput"
startCommand = "sh scripts/start_web.sh"

[[cron]]
schedule = "0 10 * * 1"   # every Monday at 10am Lagos time
command  = "python manage.py remind_inactive_users"

[[cron]]
schedule = "0 9 * * *"   # daily at 9am
command  = "python manage.py remind_unverified_users"

