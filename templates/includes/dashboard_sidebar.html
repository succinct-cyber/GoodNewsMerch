{% load static %}

<aside class="dashboard-sidebar">
  <div class="sidebar-user">
    {% if request.user.profile.profile_picture %}
      <img src="{{ request.user.profile.profile_picture.url }}" alt="Profile" class="sidebar-avatar">
    {% else %}
      <div class="sidebar-avatar-placeholder">
        <i class="fas fa-user"></i>
      </div>
    {% endif %}
    <div class="sidebar-user-info">
      <p class="sidebar-name">{{ request.user.get_full_name|default:request.user.username }}</p>
      <p class="sidebar-email">{{ request.user.email }}</p>
    </div>
  </div>

  
</aside>
