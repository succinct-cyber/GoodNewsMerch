{% extends 'base.html' %}
{% load static %}

{% block title %}Login | GoodNews Merch{% endblock %}

{% block content %}

<section class="auth-section">
  <div class="auth-layout">

    <!-- Left Panel -->
    <div class="auth-left">
      <h1 class="auth-big-title">LOGIN</h1>
      <p class="auth-brand">GOODNEWS MERCH</p>
    </div>

    <!-- Right Panel -->
    <div class="auth-right">
      <div class="auth-form-wrap">

        <form action="{% url 'login' %}" method="POST" class="auth-form">
          {% csrf_token %}

          <div class="form-group">
            <label class="form-label">USERNAME</label>
            <input
              type="text"
              name="email"
              class="form-input auth-input"
              placeholder="Enter your email"
              value="{{ request.POST.email }}"
              required
            >
          </div>

          <div class="form-group">
            <label class="form-label">PASSWORD</label>
            <div class="password-wrap">
              <input
                type="password"
                name="password"
                class="form-input auth-input"
                id="passwordInput"
                placeholder="Enter your password"
                required
              >
              <button type="button" class="password-toggle" onclick="togglePassword()">
                <i class="fas fa-eye" id="toggleIcon"></i>
              </button>
            </div>
          </div>

          <div class="auth-row">
            <label class="remember-label">
              <input type="checkbox" name="remember_me"> REMEMBER
            </label>
            <a href="{% url 'forgot_password'  %}" class="forgot-link">FORGOT PASSWORD ?</a>
          </div>

          <button type="submit" class="btn btn-dark btn-full auth-submit">
            SUBMIT
          </button>

        </form>

        <p class="auth-switch">
          Don't have an account? <a href="{% url 'register' %}">Register here</a>
        </p>

      </div>
    </div>

  </div>
</section>

{% endblock %}

{% block extra_js %}
<script>
  function togglePassword() {
    const input = document.getElementById('passwordInput');
    const icon = document.getElementById('toggleIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  }
</script>
{% endblock %}
