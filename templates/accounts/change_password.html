{% extends 'base.html' %}
{% load static %}

{% block title %}Change Password | GoodNews Merch{% endblock %}

{% block content %}

<section class="dashboard-section">
  <div class="container">
    <div class="dashboard-layout">

      {% include 'includes/dashboard_sidebar.html' %}

      <div class="dashboard-main">
        <h1 class="dashboard-title">CHANGE PASSWORD</h1>

        <div class="auth-form-wrap form-narrow">
          <form action="{% url 'change_password' %}" method="POST" class="auth-form">
            {% csrf_token %}

            <div class="form-group">
              <label class="form-label">CURRENT PASSWORD</label>
              <div class="password-wrap">
                <input type="password" name="current_password"
                       class="form-input" id="currentPwd" required>
                <button type="button" class="password-toggle"
                        onclick="togglePassword('currentPwd', 'icon1')">
                  <i class="fas fa-eye" id="icon1"></i>
                </button>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">NEW PASSWORD</label>
              <div class="password-wrap">
                <input type="password" name="new_password"
                       class="form-input" id="newPwd" required>
                <button type="button" class="password-toggle"
                        onclick="togglePassword('newPwd', 'icon2')">
                  <i class="fas fa-eye" id="icon2"></i>
                </button>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">CONFIRM NEW PASSWORD</label>
              <div class="password-wrap">
                <input type="password" name="confirm_password"
                       class="form-input" id="confirmPwd" required>
                <button type="button" class="password-toggle"
                        onclick="togglePassword('confirmPwd', 'icon3')">
                  <i class="fas fa-eye" id="icon3"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn btn-dark btn-full">UPDATE PASSWORD</button>
          </form>
        </div>

      </div>
    </div>
  </div>
</section>

{% endblock %}

{% block extra_js %}
<script>
  function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    input.type = input.type === 'password' ? 'text' : 'password';
    icon.classList.toggle('fa-eye');
    icon.classList.toggle('fa-eye-slash');
  }
</script>
{% endblock %}
