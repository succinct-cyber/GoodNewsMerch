{% extends 'base.html' %}
{% load static %}

{% block title %}Register | GoodNews Merch{% endblock %}

{% block content %}

<section class="auth-section">
  <div class="auth-layout">

    <!-- Left Panel -->
    <div class="auth-left">
      <h1 class="auth-big-title">CREATE<br>ACCOUNT</h1>
      <p class="auth-brand">GOODNEWS MERCH</p>
    </div>

    <!-- Right Panel -->
    <div class="auth-right">
      <div class="auth-form-wrap">

        {% include 'includes/alerts.html' %}

        <form action="{% url 'register' %}" method="POST" class="auth-form">
          {% csrf_token %}

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">FIRST NAME</label>
              <input
                type="text"
                name="first_name"
                class="form-input auth-input"
                value="{{ request.POST.first_name }}"
                required
              >
            </div>
            <div class="form-group">
              <label class="form-label">LAST NAME</label>
              <input
                type="text"
                name="last_name"
                class="form-input auth-input"
                value="{{ request.POST.last_name }}"
                required
              >
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">PHONE NUMBER</label>
            <input
              type="tel"
              name="phone_number"
              class="form-input auth-input"
              value="{{ request.POST.phone_number }}"
              required
            >
          </div>

          <div class="form-group">
            <label class="form-label">EMAIL ADDRESS</label>
            <input
              type="email"
              name="email"
              class="form-input auth-input"
              value="{{ request.POST.email }}"
              required
            >
          </div>

          <div class="form-group">
            <label class="form-label">PASSWORD</label>
            <div class="password-wrap">
              <input
                type="password"
                name="password"
                class="form-input auth-input"
                id="passwordInput"
                required
              >
              <button type="button" class="password-toggle" onclick="togglePassword('passwordInput', 'toggleIcon1')">
                <i class="fas fa-eye" id="toggleIcon1"></i>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">CONFIRM PASSWORD</label>
            <div class="password-wrap">
              <input
                type="password"
                name="confirm_password"
                class="form-input auth-input"
                id="confirmPasswordInput"
                required
              >
              <button type="button" class="password-toggle" onclick="togglePassword('confirmPasswordInput', 'toggleIcon2')">
                <i class="fas fa-eye" id="toggleIcon2"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-dark btn-full auth-submit">
            CREATE ACCOUNT
          </button>

        </form>

        <p class="auth-switch">
          Already have an account? <a href="{% url 'login' %}">Sign in here</a>
        </p>

      </div>
    </div>

  </div>
</section>

{% endblock %}


{% block extra_js %}
<script>
  function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  }
</script>
{% endblock %}
