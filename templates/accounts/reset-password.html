{% extends 'base.html' %}
{% load static %}

{% block title %}Reset Password | GoodNews Merch{% endblock %}

{% block content %}

<section class="auth-section">
  <div class="auth-layout">

    <!-- Left Panel -->
    <div class="auth-left">
      <h1 class="auth-big-title">RESET<br>PASSWORD</h1>
      <p class="auth-brand">GOODNEWS MERCH</p>
    </div>

    <!-- Right Panel -->
    <div class="auth-right">
      <div class="auth-form-wrap">

        <p class="auth-description">
          Choose a strong new password for your account.
        </p>

        <form action="{% url 'reset_password_confirm' uidb64 token %}" method="POST" class="auth-form">
          {% csrf_token %}

          <div class="form-group">
            <label class="form-label">NEW PASSWORD</label>
            <div class="password-wrap">
              <input
                type="password"
                name="password"
                class="form-input auth-input"
                id="newPwd"
                required
              >
              <button type="button" class="password-toggle"
                      onclick="togglePassword('newPwd', 'icon1')">
                <i class="fas fa-eye" id="icon1"></i>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">CONFIRM NEW PASSWORD</label>
            <div class="password-wrap">
              <input
                type="password"
                name="confirm_password"
                class="form-input auth-input"
                id="confirmPwd"
                required
              >
              <button type="button" class="password-toggle"
                      onclick="togglePassword('confirmPwd', 'icon2')">
                <i class="fas fa-eye" id="icon2"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-dark btn-full auth-submit">
            SET NEW PASSWORD
          </button>

        </form>

      </div>
    </div>

  </div>
</section>

{% endblock %}

{% block extra_js %}
<script>
  function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    input.type = input.type === 'password' ? 'text' : 'password';
    icon.classList.toggle('fa-eye');
    icon.classList.toggle('fa-eye-slash');
  }
</script>
{% endblock %}
